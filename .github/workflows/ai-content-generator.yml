name: 🤖 AI Content Generator

on:
  schedule:
    # Toutes les 2 heures à la minute 15
    - cron: '15 */2 * * *'
  workflow_dispatch: # Permet déclenchement manuel

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nécessaire pour le push

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🔍 Scrape AI News & Generate Article
      run: node scripts/ai-content-generator.js
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # continue-on-error pour ne pas bloquer le workflow si l'API est down
      continue-on-error: false

    - name: 🧪 Valider les articles générés
      run: node scripts/validate-articles.js

    - name: 📝 Commit and push if content generated
      run: |
        # Auteur = compte Vercel du propriétaire (obligatoire pour le deploy auto)
        git config --local user.email "19566325+Rodduprod@users.noreply.github.com"
        git config --local user.name "Rodduprod"

        # Pull les éventuels commits distants avant de pousser (évite les conflits)
        git pull --rebase origin main

        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "🤖 Auto-generated AI article - $(date '+%Y-%m-%d %H:%M UTC')"
          git push
          echo "✅ New article generated and published!"
        else
          echo "ℹ️ No new content to publish this hour"
        fi
