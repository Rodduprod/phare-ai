name: 🤖 AI Content Generator

on:
  schedule:
    # Tous les matins à 9h UTC (> 23h après le run précédent ~08h30)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer la génération (ignore le rate limit)'
        required: false
        default: 'false'
        type: boolean
      count:
        description: 'Nombre d articles à générer (défaut: 3)'
        required: false
        default: '3'
        type: string

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nécessaire pour le push

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🔍 Scrape AI News & Generate Articles
      run: node scripts/ai-content-generator.js
      env:
        LLM_PROVIDER: mistral
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
        FORCE_GENERATE: ${{ github.event.inputs.force || 'false' }}
        ARTICLES_COUNT: ${{ github.event.inputs.count || '3' }}

    - name: 🧪 Valider les articles générés
      run: node scripts/validate-articles.js

    - name: 📝 Commit and push if content generated
      id: commit_push
      run: |
        git config --local user.email "19566325+Rodduprod@users.noreply.github.com"
        git config --local user.name "Rodduprod"
        git pull --rebase origin main

        if [ -n "$(git status --porcelain)" ]; then
          git add .
          COUNT=$(git diff --cached --name-only | grep '\.mdx$' | wc -l | tr -d ' ')
          git commit -m "🤖 Auto-generated $COUNT articles - $(date '+%Y-%m-%d')"
          git push
          echo "articles_count=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ $COUNT articles published!"
        else
          echo "articles_count=0" >> $GITHUB_OUTPUT
          echo "ℹ️ No new content to publish today"
        fi

    - name: 🚨 Échouer si 0 articles générés (alerte GitHub)
      if: steps.commit_push.outputs.articles_count == '0'
      run: |
        echo "::error::🚨 ALERTE : 0 article généré aujourd'hui !"
        echo "::error::Causes possibles : rate limit non écoulé, clé API invalide, 0 actu IA détectée."
        echo "::error::Vérifier les logs de l'étape 'Scrape AI News & Generate Articles' ci-dessus."
        exit 1

    - name: 🐦 Publier sur X (@le_labo_ai)
      if: steps.commit_push.outputs.articles_count != '0'
      env:
        X_API_KEY: ${{ secrets.X_API_KEY }}
        X_API_SECRET: ${{ secrets.X_API_SECRET }}
        X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      run: |
        ARTICLES_FILE="/tmp/generated_articles.json"
        if [ -f "$ARTICLES_FILE" ]; then
          echo "📤 Publication sur X..."
          node scripts/post-to-x.js "$(cat $ARTICLES_FILE)" || echo "⚠️ Erreur X (non bloquant)"
        else
          echo "ℹ️ Pas de fichier articles — skip X"
        fi

    - name: 🔔 Alerte Telegram si échec
      if: failure()
      run: |
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MESSAGE="🚨 *Le Labo AI : génération échouée*%0A%0ARun : $RUN_URL%0ATrigger : ${{ github.event_name }}%0ADate : $(date -u '+%Y-%m-%d %H:%M UTC')"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown" > /dev/null
