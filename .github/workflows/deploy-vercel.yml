name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Link Vercel project
        run: |
          PROJECT=$(curl -s "https://api.vercel.com/v9/projects/phare-ai" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          PROJECT_ID=$(echo "$PROJECT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          ORG_ID=$(echo "$PROJECT" | python3 -c "import sys,json; print(json.load(sys.stdin)['accountId'])")
          mkdir -p .vercel
          echo "{\"orgId\":\"$ORG_ID\",\"projectId\":\"$PROJECT_ID\"}" > .vercel/project.json
          echo "✅ Linked: $PROJECT_ID"

      - name: 🔕 Désactiver le build auto Vercel (Git integration)
        run: |
          curl -s -X PATCH "https://api.vercel.com/v9/projects/phare-ai" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"commandForIgnoringBuildStep":"exit 1"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ ignoreCommand:', d.get('commandForIgnoringBuildStep','?'))"

      - name: ⬇️ Pull Vercel env vars
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build (local — Next.js avec ISR)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🔔 Alerte Telegram si échec
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="🚨 *Déploiement Vercel échoué*%0ARun : $RUN_URL"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown" > /dev/null
