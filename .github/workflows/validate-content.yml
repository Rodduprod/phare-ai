name: ✅ Validate Content

on:
  push:
    paths:
      - 'content/articles/**'
  pull_request:
    paths:
      - 'content/articles/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate MDX articles

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🧪 Validate articles frontmatter
      run: node scripts/validate-articles.js
